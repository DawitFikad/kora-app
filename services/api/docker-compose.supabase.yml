# ET-Ticket Platform — Docker Compose (Supabase as external DB)
# ===============================================================
# This alternative to docker-compose.yml does NOT include a local
# PostgreSQL container — it expects DATABASE_URL/DIRECT_URL in .env
# to point to your Supabase project.
#
# Usage:
#   docker compose -f docker-compose.supabase.yml up -d
#
# This will start:
#   - redis (local cache, required)
#   - api   (Express app connecting to Supabase)
#
# The web (Vite) service is also available if you need the frontend.

services:
  redis:
    image: redis:6
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: .
    restart: unless-stopped
    working_dir: /usr/src/app
    environment:
      NODE_ENV: development
      PORT: "4001"
      EXPOSE_OTP_IN_DOCKER: "${EXPOSE_OTP_IN_DOCKER:-false}"
      ALLOW_MASTER_OTP: "${ALLOW_MASTER_OTP:-false}"
      ALLOW_TEST_OTP_BYPASS: "${ALLOW_TEST_OTP_BYPASS:-false}"
      # NOTE: DATABASE_URL and DIRECT_URL are read from .env file
      # (Supabase URLs). The local DB service is NOT used.
      REDIS_URL: "redis://redis:6379"
      API_URL: "http://127.0.0.1:4001"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    env_file:
      - .env
    ports:
      - "4001:4001"
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD", "node", "-e", "const net=require('net');const s=net.connect(4001,'127.0.0.1',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),1500);" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    command: [ "npm", "run", "dev" ]

  web:
    image: node:20-bullseye
    restart: unless-stopped
    working_dir: /usr/src/app
    environment:
      - NODE_ENV=development
      - VITE_API_PROXY_TARGET=http://api:4001
    volumes:
      - ../../app/web-app:/usr/src/app:cached
      - /usr/src/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "cd /usr/src/app && npm install --silent && npm run dev -- --host"
    depends_on:
      api:
        condition: service_healthy
