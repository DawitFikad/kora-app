services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2123
      POSTGRES_DB: Et-ticket-db
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:6
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: .
    working_dir: /usr/src/app
    environment:
      NODE_ENV: development
      EXPOSE_OTP_IN_DOCKER: "true"
      PORT: "4001"
      DATABASE_URL: "postgresql://postgres:2123@db:5432/Et-ticket-db?schema=public"
      DIRECT_URL: "postgresql://postgres:2123@db:5432/Et-ticket-db?schema=public"
      REDIS_URL: "redis://redis:6379"
      # Public/local callback base for browser-facing links.
      API_URL: "http://127.0.0.1:4001"
      # Enable polling for file watchers inside Docker (fixes missed change events on Windows)
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    env_file:
      - .env
    ports:
      - "4001:4001"
    volumes:
      # Use a plain bind mount so inotify / file watching works reliably on Windows
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db
      - redis
    command: [ "npm", "run", "dev" ]

  web:
    image: node:20-bullseye
    working_dir: /usr/src/app
    environment:
      - NODE_ENV=development
      # Vite proxy target from inside the web container.
      - VITE_API_PROXY_TARGET=http://api:4001
    volumes:
      - ../../app/web-app:/usr/src/app:cached
      - /usr/src/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "cd /usr/src/app && npm install --silent && npm run dev -- --host"
    depends_on:
      - api

volumes:
  db-data:
