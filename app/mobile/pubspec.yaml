name: mobile
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter

  
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0
  shared_preferences: ^2.2.2
  dio: ^5.4.0
  easy_localization: ^3.0.3
  google_fonts: ^6.1.0
  qr_flutter: ^4.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  intl: ^0.20.2
  google_nav_bar: ^5.0.7
  url_launcher: ^6.2.1
  image_picker: ^1.2.1
  connectivity_plus: ^5.0.2
  crypto: ^3.0.3
  package_info_plus: ^8.0.0
  mobile_scanner: ^7.1.4
  vibration: ^3.1.4
  sqflite: ^2.4.2
  path: ^1.9.1
  share_plus: ^7.2.1
  device_preview: ^1.3.1
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter

 
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/kora_icon.png"




flutter:

 
  uses-material-design: true

 
  assets:
    - assets/translations/

  

  
